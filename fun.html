<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fun — Jennifer Yaya Falanga</title>
  <meta name="description" content="A minimal collection of past work — pieces worth sharing, outside the case studies." />

  <link rel="stylesheet" href="https://use.typekit.net/rwl3qku.css">

  <style>
    /* ============================================================
       Yaya Falanga — Portfolio 2026 Redesign
       Case study template. Self-contained styles; tokens to be
       extracted to a shared stylesheet once all pages migrate.
       ============================================================ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── Design Tokens ────────────────────────────────────── */
    :root {
      --ink:        #5A0600;
      --ink-soft:   #CAA3A3;
      --bg:         #F9F8F6;
      --bone:       #F9F8F6;
      --placeholder:#DBDBDB;

      --font-display: "mr-eaves-modern", "Helvetica Neue", Arial, sans-serif;
      --font-body:    "mr-eaves-sans", "Helvetica Neue", Arial, sans-serif;

      --margin: 80px;
      --gutter: 16px;

      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 1.1875rem;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    ::selection { background: var(--ink); color: var(--bone); }

    /* ─── Grid scaffold ────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      column-gap: var(--gutter);
      padding-inline: var(--margin);
    }
    .span-content { grid-column: 2 / 12; }

    /* ─── Shared text styles ───────────────────────────────── */
    .eyebrow {
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .eyebrow--soft { color: var(--ink-soft); }

    .text-link {
      text-decoration: underline;
      text-underline-offset: 0.18em;
      text-decoration-thickness: 1px;
      transition: text-decoration-color var(--transition);
    }
    .text-link:hover { text-decoration-color: var(--ink-soft); }

    hr.rule { border: none; border-top: 1px solid var(--ink-soft); }

    /* ─── Navigation ───────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--ink);
      align-items: center;
      padding-block: 2rem;
    }
    .nav__inner {
      grid-column: 1 / 13;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .nav__logo {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
    }
    .nav__links {
      display: flex;
      gap: 4.5rem;
      font-weight: 700;
      font-size: 1.0625rem;
    }
    .nav__links a { transition: color var(--transition); }
    .nav__links a:hover { color: var(--ink-soft); }

    /* ─── Hero ─────────────────────────────────────────────── */
    .hero { padding-block: 5.5rem 0; }

    .hero__eyebrow { display: block; margin-bottom: 1.1rem; }

    .hero__title {
      font-family: var(--font-display);
      font-size: clamp(2.75rem, 5.5vw, 4.5rem);
      font-weight: 400;
      line-height: 1.08;
      margin-bottom: 2.25rem;
    }

    .hero__rule { grid-column: 2 / 12; }

    .hero__tagline {
      grid-column: 2 / 8;
      margin-top: 2rem;
    }

    .hero__cta {
      grid-column: 2 / 12;
      justify-self: start;
      margin-top: 2rem;
      display: inline-block;
      border: 1px solid var(--ink);
      padding: 0.85em 1.6em;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background var(--transition), color var(--transition);
    }
    .hero__cta:hover { background: var(--ink); color: var(--bone); }

    .hero__meta {
      grid-column: 2 / 12;
      margin-top: 4rem;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      column-gap: var(--gutter);
      row-gap: 2rem;
    }
    .hero__meta-item { grid-column: span 3; }
    .hero__meta-item:nth-child(3n+1):last-child,
    .hero__meta-item:nth-child(4) { grid-column: span 3; }
    .meta-label {
      display: block;
      color: var(--ink-soft);
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }
    .meta-value { font-size: 1.0625rem; max-width: 36ch; }

    /* ─── Figures ──────────────────────────────────────────── */
    .cs-figure { padding-block: 4.5rem 0; }
    .cs-figure figure,
    .cs-figure .fig-inner { grid-column: 2 / 12; }
    .cs-figure img,
    .cs-figure iframe {
      width: 100%;
      border: 1px solid var(--ink-soft);
      background: var(--placeholder);
    }
    .cs-figure figcaption {
      margin-top: 0.8rem;
      font-size: 0.9375rem;
      color: var(--ink);
    }

    /* ─── Case study sections ──────────────────────────────── */
    .cs-section { padding-top: 5.5rem; }
    .cs-section .wrap-text { grid-column: 2 / 12; max-width: 82ch; }

    .cs-eyebrow {
      display: block;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 1.1rem;
    }

    .cs-h2 {
      font-family: var(--font-body);
      font-size: 1.625rem;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 1.4rem;
    }

    .cs-p { margin-bottom: 1.4rem; }
    .cs-p:last-child { margin-bottom: 0; }

    .cs-link {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 0.15em;
      transition: color var(--transition), border-color var(--transition);
    }
    .cs-link:hover { color: var(--ink-soft); border-color: var(--ink-soft); }

    /* ─── Insight pivot ────────────────────────────────────── */
    .insight__pivot {
      display: grid;
      grid-template-columns: 1fr 1fr;
      margin-block: 2.25rem 1.5rem;
    }
    .pivot__cell {
      border: 1px solid var(--ink);
      padding: 1.4rem 1.6rem;
    }
    .pivot__cell--dark {
      background: var(--ink);
      color: var(--bone);
      border-color: var(--ink);
    }
    .pivot__cell-label {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .pivot__cell--dark .pivot__cell-label { color: var(--ink-soft); }
    .pivot__cell-text { font-size: 1.125rem; }

    /* ─── Decisions ────────────────────────────────────────── */
    .decisions__list { margin-top: 1rem; }
    .decision {
      display: grid;
      grid-template-columns: 3.5rem 1fr;
      gap: var(--gutter);
      padding-block: 2.25rem;
      border-top: 1px solid var(--ink-soft);
    }
    .decision:first-child { border-top: none; padding-top: 1rem; }
    .decision__num {
      font-family: var(--font-display);
      font-size: 1.25rem;
    }
    .decision__title {
      font-family: var(--font-body);
      font-size: 1.1875rem;
      font-weight: 700;
      margin-bottom: 0.7rem;
    }
    .decision__body { margin-bottom: 1.1rem; }
    .decision__tradeoff {
      display: grid;
      grid-template-columns: 6.5rem 1fr;
      gap: var(--gutter);
      font-size: 1.0625rem;
    }
    .decision__tradeoff-label {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
      padding-top: 0.25em;
    }

    /* ─── Outcome ──────────────────────────────────────────── */
    .outcome__lead {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 2.6vw, 2rem);
      line-height: 1.3;
      margin-bottom: 1.6rem;
    }

    /* ─── Next project ─────────────────────────────────────── */
    .next-project {
      display: block;
      padding-block: 5.5rem 6.5rem;
    }
    .next-project .wrap-text { grid-column: 2 / 12; }
    .next-project__label {
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 0.8rem;
    }
    .next-project__title {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 3.4vw, 2.625rem);
      line-height: 1.15;
      transition: color var(--transition);
    }
    a.next-project:hover .next-project__title { color: var(--ink-soft); }

    .rule-section { padding-top: 5.5rem; }
    .rule-section hr { grid-column: 2 / 12; }

    /* ─── Footer ───────────────────────────────────────────── */
    .footer {
      background: var(--ink);
      color: var(--bone);
      padding-block: 4.5rem 3.5rem;
    }
    .footer__inner {
      grid-column: 1 / 13;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      column-gap: var(--gutter);
      row-gap: 5rem;
    }
    .footer__chat {
      grid-column: 1 / 6;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .footer__chat-line {
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .footer__social { display: inline-flex; align-self: flex-start; }
    .footer__social svg { width: 20px; height: 20px; }

    .footer__contact { grid-column: 7 / 11; }
    .footer__pages   { grid-column: 11 / 13; }
    .footer__contact, .footer__pages {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .footer h3 {
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 700;
      margin-bottom: 2.75rem;
    }
    .footer__fields { display: flex; gap: 3rem; flex-wrap: wrap; }
    .footer__field-label {
      display: block;
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 0.4rem;
    }
    .footer__field-value {
      font-size: 0.9375rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }
    .footer a { transition: opacity var(--transition); }
    .footer a.footer__field-value:hover,
    .footer__pages a:hover,
    .footer__social:hover { opacity: 0.7; }
    .copy-btn {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      display: inline-flex;
      padding: 0;
      transition: opacity var(--transition);
    }
    .copy-btn:hover { opacity: 0.7; }
    .copy-btn svg { width: 14px; height: 14px; }
    .footer__pages-links {
      display: flex;
      gap: 2rem;
      align-items: baseline;
      font-size: 0.9375rem;
      font-weight: 700;
    }


    /* ─── Fun gallery ──────────────────────────────────────── */
    .gallery { padding-block: 4rem 7rem; }
    .gallery__inner { grid-column: 2 / 12; }
    .gallery__columns {
      columns: 3;
      column-gap: var(--gutter);
    }
    .gallery__item {
      break-inside: avoid;
      margin-bottom: var(--gutter);
      background: var(--placeholder);
    }
    .gallery__item img {
      width: 100%;
      display: block;
      min-height: 240px; /* placeholder presence until images exist */
    }

    /* ─── Focus + motion ───────────────────────────────────── */
    a:focus-visible, button:focus-visible {
      outline: 2px solid currentColor;
      outline-offset: 3px;
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { transition: none !important; }
    }

    /* ─── Responsive ───────────────────────────────────────── */
    @media (max-width: 1024px) {
      :root { --margin: 48px; }
      .span-content, .hero__rule, .hero__cta, .hero__meta,
      .cs-section .wrap-text, .cs-figure figure, .cs-figure .fig-inner,
      .next-project .wrap-text, .rule-section hr { grid-column: 1 / 13; }
      .hero__tagline { grid-column: 1 / 10; }
      .hero__meta { grid-template-columns: repeat(2, 1fr); }
      .gallery__inner { grid-column: 1 / 13; }
      .gallery__columns { columns: 2; }
      .hero__meta-item { grid-column: auto; }
    }

    @media (max-width: 720px) {
      :root { --margin: 24px; }
      body { font-size: 1.125rem; }
      .nav { padding-block: 1.4rem; }
      .nav__links { gap: 2rem; }
      .hero { padding-top: 3.5rem; }
      .hero__tagline { grid-column: 1 / 13; }
      .hero__meta { grid-template-columns: 1fr; row-gap: 1.5rem; margin-top: 3rem; }
      .cs-section { padding-top: 4rem; }
      .cs-figure { padding-top: 3rem; }
      .insight__pivot { grid-template-columns: 1fr; }
      .pivot__cell--dark { border-top: none; }
      .decision { grid-template-columns: 2.25rem 1fr; padding-block: 1.75rem; }
      .decision__tradeoff { grid-template-columns: 1fr; gap: 0.4rem; }
      .footer__chat, .footer__contact, .footer__pages { grid-column: 1 / 13; }
      .footer__inner { row-gap: 3.5rem; }
      .footer__social { margin-top: 2rem; }
      .footer h3 { margin-bottom: 1.5rem; }
      .gallery { padding-block: 2.5rem 4.5rem; }
      .gallery__columns { columns: 1; }
    }
  </style>
</head>
